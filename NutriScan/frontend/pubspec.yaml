name: nutriscan_app
description: An app for nutrition tracking and food identification.
publish_to: 'none' # Remove this line if you intend to publish to pub.dev
version: 1.0.0+1 # Versão 1.0.0, build number 1

environment:
  sdk: '>=3.0.0 <4.0.0' # Ou a versão do seu SDK

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # HTTP Client
  dio: ^5.3.3

  # State Management (BLoC)
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Storage
  shared_preferences: ^2.2.2 # Para configurações simples

  # Camera & Image Processing
  camera: ^0.10.5+9
  image_picker: ^1.0.4
  image_cropper: ^5.0.0 # Para cortar imagens

  # UI/UX Enhancements
  google_fonts: ^6.1.0
  intl: ^0.18.1 # Para formatação de datas

  # Permissions
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Melhores práticas de linting para Flutter

  flutter:
  uses-material-design: true

  assets:
    - assets/profile_pic.png
    - assets/salad.png
    - assets/avocado_toast.png
    - assets/coffee.png
    - assets/chicken.png
    - assets/salad_bowl.png
    - assets/banana.png